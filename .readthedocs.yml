version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    build:
      html:
        - mkdir -p $READTHEDOCS_OUTPUT/html
        - cd docs && uv run --group docs sphinx-build -T -b html . _build/html
        - mv docs/_build/html/* $READTHEDOCS_OUTPUT/html/

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs

submodules:
  include: all
  recursive: true
